server {
    listen __PORT__ default_server;
    server_name _;
    root /app/public;
    index index.php;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Asset Mapper (prod), fonts, uploads, and other files under /public
    location ~* \.(?:css|js|mjs|map|png|jpe?g|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    location ^~ /fonts/ {
        expires 1y;
        try_files $uri =404;
        access_log off;
    }

    location ^~ /uploads/ {
        try_files $uri =404;
        access_log off;
    }

    # Handle .well-known requests (Let's Encrypt, etc.)
    location ~ /\.well-known {
        allow all;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny access to sensitive files
    location ~ ~$ {
        deny all;
    }

    # Main application - route all requests through index.php
    location / {
        # Try file, directory, else forward to index.php
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # PHP-FPM handler
    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;

        # Custom FastCGI parameters
        fastcgi_param HTTP_HOST $fcgi_http_host;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeout settings for long-running requests
        fastcgi_read_timeout 60s;
        fastcgi_connect_timeout 60s;
        
        # Don't pass the PATH_INFO to the next request
        internal;
    }

    # Deny execution of PHP files in other locations
    location ~ \.php$ {
        return 404;
    }
}