# Force ngrok visitors on root to the admin login page.
ngrok_root_redirect:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: adminls_login
        permanent: false
    condition: "request.headers.get('x-forwarded-host') matches '/ngrok/i' or request.headers.get('x-original-host') matches '/ngrok/i' or request.headers.get('host') matches '/ngrok/i' or request.getHost() matches '/ngrok/i' or request.headers.get('forwarded') matches '/ngrok/i'"

# When APP_ROOT_TO_ADMIN=1 or host is *.up.railway.app → admin login (not the storefront).
admin_root_redirect:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: adminls_login
        permanent: false
    condition: "env('APP_ROOT_TO_ADMIN') == '1' or request.getHost() matches '/\\.up\\.railway\\.app$/'"

# /landingpage is the public shop URL; on Railway/admin mode send visitors to admin login instead.
admin_landingpage_redirect:
    path: /landingpage
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: adminls_login
        permanent: false
    condition: "env('APP_ROOT_TO_ADMIN') == '1' or request.getHost() matches '/\\.up\\.railway\\.app$/'"

# Default root redirects to the public landing page (local dev and storefront URL).
root_landingpage_redirect:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: app_landingpage_legacy
        permanent: false
    condition: "env('APP_ROOT_TO_ADMIN') != '1' and not request.getHost() matches '/\\.up\\.railway\\.app$/' and not (request.headers.get('x-forwarded-host') matches '/ngrok/i' or request.headers.get('x-original-host') matches '/ngrok/i' or request.headers.get('host') matches '/ngrok/i' or request.getHost() matches '/ngrok/i' or request.headers.get('forwarded') matches '/ngrok/i')"

controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute

# Explicit route so Turbo/registration flow can generate it reliably.
app_verify_email:
    path: /verify-email
    controller: App\Controller\EmailVerificationController::verifyUserEmail
