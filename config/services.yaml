# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    mailer_from_address: '%env(MAILER_FROM_ADDRESS)%'
    mailer_from_name: '%env(default::MAILER_FROM_NAME)%'
    # Safe defaults when deploying without a local .env file (Railway, Docker)
    cors_allow_origin: '^.*$'
    mailer_dsn: 'null://null'
    google_client_id: ''
    google_client_secret: ''
    google_callback_url: ''
    google_android_client_id: ''
    google_ios_client_id: ''
    app_default_uri: 'http://localhost'
    messenger_dsn: 'sync://'
    env(MAILER_FROM_ADDRESS): 'noreply@localhost'
    env(JWT_PASSPHRASE): ''
    # Default when APP_DEEP_LINK_SCHEME is unset (mobile OAuth redirect: vallejera://auth/callback)
    env(APP_DEEP_LINK_SCHEME): 'vallejera'
    app_deep_link_scheme: 'vallejera'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Service\EmailVerificationService:
        arguments:
            $fromAddress: '%mailer_from_address%'
            $fromName: '%mailer_from_name%'

    App\Service\StaffVerificationService:
        arguments:
            $fromAddress: '%mailer_from_address%'
            $fromName: '%mailer_from_name%'

    App\Controller\GoogleLoginController:
        arguments:
            $googleClientId: '%env(default:google_client_id:GOOGLE_CLIENT_ID)%'
            $googleClientSecret: '%env(default:google_client_secret:GOOGLE_CLIENT_SECRET)%'
            $googleCallbackUrl: '%env(default:google_callback_url:GOOGLE_CALLBACK_URL)%'

    App\Service\Google\GoogleIdTokenVerifier:
        arguments:
            $allowedAudiences:
                - '%env(default:google_client_id:GOOGLE_CLIENT_ID)%'
                - '%env(default:google_android_client_id:GOOGLE_ANDROID_CLIENT_ID)%'
                - '%env(default:google_ios_client_id:GOOGLE_IOS_CLIENT_ID)%'

    App\Security\MobileOAuthJwtBridge:
        arguments:
            $appDeepLinkScheme: '%env(default:app_deep_link_scheme:APP_DEEP_LINK_SCHEME)%'

    App\Controller\StaffGoogleLoginController:
        arguments:
            $googleClientId: '%env(default:google_client_id:GOOGLE_CLIENT_ID)%'
            $googleClientSecret: '%env(default:google_client_secret:GOOGLE_CLIENT_SECRET)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
